<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>University Logo Belt</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
}

.logo-slider{
    width:100%;
    height:250px;
    overflow:hidden;
    position:relative;
}

.logo-track{
    display:flex;
    align-items:center;
    width:max-content;
    animation: marquee 50s linear infinite;
}

.logo-track:hover{
    animation-play-state:paused;
}

.logo-track img{
    width:209px;
    height:208px;
    object-fit:contain;
    margin:0 45px;
    flex-shrink:0;
    user-select:none;
}

@keyframes marquee{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}

</style>

</head>

<body>

<div class="logo-slider">

<div class="logo-track">

<img src="images/Assam_University_Logo (1).png" alt="">
<img src="images/Cotton_Univ-removebg-preview.png" alt="">
