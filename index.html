<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Logo Belt</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:transparent;
overflow:hidden;
}

.logo-slider{
overflow:hidden;
white-space:nowrap;
position:relative;
width:100%;
padding:20px 0;
}

.logo-track{
display:inline-flex;
align-items:center;
animation:scroll 25s linear infinite;
}

.logo-track img{
height:90px;
margin:0 45px;
object-fit:contain;
transition:.3s;
}

.logo-track img:hover{
transform:scale(1.1);
}

@keyframes scroll{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

</style>

</head>

<body>

<div class="logo-slider">

<div class="logo-track">

<img src="images/Assam_University_Logo (1).png">
<img src="images/Cotton_Univ-removebg-preview.png">
