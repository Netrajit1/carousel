<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>University Logo Belt</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
}

.logo-slider{
    width:100%;
    height:240px;
    overflow:hidden;
    position:relative;
    background:transparent;
}

.logo-track{
    display:flex;
    align-items:center;
    width:max-content;
    animation:scroll 40s linear infinite;
}

.logo-track:hover{
    animation-play-state:paused;
}

.logo-track img{
    width:209px;
    height:208px;
    object-fit:contain;
    margin:0 40px;
    flex-shrink:0;
    display:block;
}

@keyframes scroll{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

</style>

</head>

<body>

<div class="logo-slider">

<div class="logo-track">

<img src="images/Assam_University_Logo (1).png">
<img src="images/Cotton_Univ-removebg-preview.png">
<img src="images/Dimoria_Logo-removebg-preview.png">
<img src="images/Kohima_Science_College_Logo.png">
<img src="images/Mizoram_University_logo.png">
<img src="images/North-Eastern_Hill_University_Logo.png">
<img src="images/Prag_Logo-removebg-preview.png">
<img src="images/Stanthony_Logo-removebg-preview.png">
<img src="images/Tezpur_University_logo.png">
<img src="images/du-removebg-preview.png">
<img src="images/mtu.png">
<img src="images/rgu-logo.png">
<img src="images/tit_Logo-removebg-preview.png">

<!-- Duplicate Logos for Infinite Loop -->

<img src="images/Assam_University_Logo (1).png">
<img src="images/Cotton_Univ-removebg-preview.png">
<img src="images/Dimoria_Logo-removebg-preview.png">
<img src="images/Kohima_Science_College_Logo.png">
<img src="images/Mizoram_University_logo.png">
<img src="images/North-Eastern_Hill_University_Logo.png">
<img src="images/Prag_Logo-removebg-preview.png">
<img src="images/Stanthony_Logo-removebg-preview.png">
<img src="images/Tezpur_University_logo.png">
<img src="images/du-removebg-preview.png">

</div>

</div>

</body>
</html>
