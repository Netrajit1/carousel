<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Horizontal Logo Belt</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
}

.logo-slider{
    width:100%;
    overflow:hidden;
    padding:20px 0;
}

.logo-track{
    display:flex;
    width:max-content;
    animation: marquee 30s linear infinite;
}

.logo-track img{
    width:140px;
    height:90px;
    object-fit:contain;
    margin:0 35px;
    flex-shrink:0;
}

.logo-track:hover{
    animation-play-state:paused;
}

@keyframes marquee{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-50%);
    }

}

</style>

</head>

<body>

<div class="logo-slider">

<div class="logo-track">

<img src="images/Assam_University_Logo (1).png">
<img src="images/Cotton_Univ-removebg-preview.png">
